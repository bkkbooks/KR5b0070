body:
  text: 太極紫微帝心咒十通吉祥檀熾鈞臣等六根爲讚揚惟願慈悲作證度咒燭無窮照法界大光大明三景輪明過日月及天光照燭幽途普開朗咒音無窮通法界神雷天鼓玉音傳振輝法韻響靈音開悟眾生悉明慧咒香無窮徧法界不增不減太和風灑爲法雨出爲雲霑馥眾生溥淸淨咒味無邊周法界太和太一萬善源外爲神水內華池潤益眾生悉長命咒相無窮大變化眞應法身如塵沙金肌玉骨萬道全堅固金剛形不壞咒心十通徧法界無高無下普開明龍光一點出中山照徹人天悉開悟咒威無量神通廣力過那耶殺古尊收降六洞大魔軍斷絕鬼鋒正仙道咒福無邊廣圓滿富王貴王不能過有如天尊大意珠光照無窮福德藏咒德無量大慈悲從劫至劫運慈仁巍巍三氣道中尊周濟人天悉圓滿臣等六根讚嘆已至於身外植玄根玄根永茂徧人天同等一乘眞妙行是時太玄道父威德自在天尊定一眞人蔚羅眞人諸天眞人神仙天帝神王仙官仙王飛仙玉女水史眞妃芳華采玉女等說偈讚嘆已稽首天尊奉辭而退
