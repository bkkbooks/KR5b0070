front:
  text: 太上洞淵三昧帝心光明正印太極紫微伏魔制鬼拯救惡道集福吉祥神咒太微紫微妙諦經華敏忍宗太英含元文象郭舒孤界吻雕盤盧福昭明輪混洞太無玉皇玄中吉祥音檀熾鈞蒼䕫和庠塗波陜符南臯玄母坐臺赤混太無玉虛元生吉祥音檀熾鈞翊琚儲靈內章元帝藍欹無紫衜衠瑚䝉甘冥寂玄通玉虛始神吉祥音檀熾鈞太淸紫華飛神度命岑葆觚華吉祥音檀熾鈞太淸丹華飛光保生𧤽音閉朔楙宻吉祥音檀熾鈞太淸靑華飛仙鍊神豈瓦甄銘奮勵宛吉祥音檀熾鈞上淸素華飛靈鍊形浸斠唐彭燕吉祥音檀熾鈞上淸黃華飛化鍊氣窪巢婁鎬衡吉祥音檀熾鈞上淸綠華飛明護魂覺廕珂琰觀吉祥音檀熾鈞玉淸瑤華飛玄長生藍蘇丹株包企模吉祥音檀熾鈞玉淸碧華飛黃飛仙晶羅頡力吉祥音檀熾鈞玉淸玉華飛玄洞玄都明最旭晨吉祥音檀熾鈞玉虛金華飛玄妙靈旭薈晨轆音標吉祥音檀熾鈞洞淵黃華三昧帝心大洞光明正印玄章太極眞常紫微眞母伏降六天制禦萬鬼拯救惡趣賔治儀盧消滅萬災集定萬福結集生氣貫入玄津演吉祥音注歸丹母發生內寶玉芝琅英黃芽金液琅玕玄珠九轉八瓊證聖眞仙十通妙行圓滿濟度大洞帝一尊君吉祥音檀熾鈞天尊彼時玉音光中增飾妙華洞觀始通吉祥音檀熾鈞洞微梵通吉祥音檀熾鈞洞空氣通吉祥音檀熾鈞洞虛華通吉祥音檀熾鈞洞靈力通吉祥音檀熾鈞洞眞道通吉祥音檀熾鈞洞玄靈光通吉祥音檀熾鈞洞源神通洞明帝心玄通洞淸㝠慧元通吉祥音檀熾鈞終全眞一安處無爲妙行一乘中觀思神念眞慧命作用通氣制禦萬靈吉祥音檀熾鈞通神坐致自然通靈坐在立亡吉祥音檀熾鈞道備登晨飛升太空位登仙公侍列玉淸無無上眞吉祥音檀熾鈞太眞玄符普度天人吉祥音檀熾鈞是時元始天尊與威德自在天尊同聲重說太極紫微伏魔制鬼拯救惡道消災集福吉祥神咒已六天震動魔山崩摧𡨚裔絕源地根斷蒂鬼趣消滅倶化善神是時會中無量飛仙淸和玉女水史眞妃芳華采玉女百千億萬眾雨八色天花繽紛飄下香風熏馥和氣氤氲元始天王告定一眞人蔚羅眞人曰此神咒玉章乃三昧帝心光明正印太極妙本紫微眞人能破𡨚魔心能救鬼趣苦能消萬災劫能集萬福祥功德無邊不可思議今日爲汝等重宣玉文增飾咒心圓滿妙行使汝等持此咒印利益人天度諸有情齊登聖果今宣玉勅囑二眞人汝稟命奉行普濟普度勅威德自在天尊定一二眞人徧滿十方界持我光明輪三昧太定印帝心行大心制伏六洞魔破滅萬鬼羣解釋十二𡨚結網悉消平鬼趣絕惡根凶魔化善神我道一氣沖淸和鼓化風自彼鬼類幽直超三善中帝心成大心正氣永和融學仙修大乘妙行著玄功豸修䝟與𩙷貙悟眞登仙公使彼洞淵心玄玄控三龍化合眾生心光明澄十通安集太眞房逍遙景華峯怡然金闕庭玉光他我同氣與元始通吉祥成大功於是太玄道父威德自在天尊定一眞人蔚羅眞人飛仙玉女淸和玉女水史眞妃芳華采玉女諸天仙眾異口同光並作一音太和自然說偈讚嘆云
