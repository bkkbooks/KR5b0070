front:
  text: 太上洞淵三昧帝心光明正印太極紫微伏魔制鬼拯救惡道集福吉祥神呪太微紫微妙諦經華敏忍宗太英含元文象郭舒孤界吻雕盤盧福昭明輪混洞太無玉皇玄中吉祥音檀熾鈞蒼䕫和庠塗波陜符南臯玄毋坐臺赤混太無玉虚元生吉祥音檀熾鈞翊琚儲靈内章元帝藍欹無紫衜瑚蒙甘㝠寂玄通玉虚始神吉祥音檀熾鈞太清紫華飛神度命岑葆觚華吉祥音檀熾鈞太清丹華飛光保生𧤽音間朔楙宻吉祥音檀熾鈞太清青華飛仙鍊神甄銘奮勵宛吉祥音檀熾釣上清素華飛靈鍊形浸斠唐彭燕吉祥音檀熾鈞上清黃華飛化鍊氣窪巢婁鎬衡吉祥音檀熾鈞上清緑華飛明䕶䰟覺廕珂琰觀吉祥音檀熾鈞玉清瑶華飛玄長生藍蘇丹株包企模吉祥音檀熾鈞玉清碧華飛黃飛仙晶羅頡力吉祥音壇熾鈞玉清玉華飛玄洞玄都明最旭晨吉祥音檀熾鈞玉虚金華飛玄妙靈旭薈晨轆音櫓吉祥音檀熾鈞洞淵黃華三昧帝心大洞光明正印玄章太極真常紫微真毋伏降六天制禦萬鬼拯救惡趣賔治儀盧消滅萬灾集定萬福結集生氣貫入玄津演吉祥音注歸丹母發生內寳玉芝琅英黃芽金液琅玕玄珠九轉八瓊證聖真仙十通妙行圓滿濟度大洞帝一尊君吉祥音檀熾鈞天尊彼時玉音光中增飾妙華洞觀始通吉祥音檀熾鈞洞微梵通吉祥音檀熾鈞洞空氣通吉祥音檀鈞洞虚華通吉祥音檀熾鈞洞靈力通吉祥音禮熾鈞洞眞道通吉祥音檀熾鈞洞玄靈光通吉祥音檀熾鈞洞源神通洞明帝心玄通洞清冥慧元通吉祥音檀熾鈞終全眞一安處無爲妙行一乗中觀思神念眞慧命作用通氣制禦萬靈吉祥音檀熾鈞通神坐致自然通靈坐在立已吉祥音檀熾鈞道備登晨飛升太空位登仙公侍列玉清無無上眞吉祥音檀熾鈞太眞玄符普度天人吉祥音檀熾鈞是時元始天尊與威德自在天尊同聲重説太極紫微伏魔制鬼拯救惡道消灾集福吉祥神呪已六天震動魔山崩摧𡨚裔絶源地根斷蒂鬼趣清滅倶化善神是時㑹中無量飛仙清和玉女水史眞妃芳華采玉女百千億萬衆雨八色天花繽紛飄下香風熏馥和氣氤氲元始天王告定一眞人蔚羅眞人曰此神呪玉章乃三昧帝心光明正印太極妙本紫微眞人能破𡨚魔心能救鬼趣苦能消萬灾劫能集萬福祥功德無邊不可思譏今日爲汝等重宣玉文增飾呪心圓滿妙行使汝等持此呪印利益人天度諸有情齊登聖果今宣玉勑囑二真人汝禀命奉行普濟普度勑威德自在天尊定一二眞人徧滿十方界持我光明輪三昧太定印帝心行大心制伏六洞魔破滅萬鬼羣解釋十二𡨚結網悉消平鬼趣絶惡根凶魔化善神我道一氣沖清和鼓化風自彼鬼類幽直超三善中帝心成大心正氣永和融學仙修大乗妙行著玄功䝟與貙悟眞登仙公使彼洞淵心玄玄控三龍化合衆生心光明澄十通安集太眞房逍遥景華峯怡然金闕庭玉光他我同氣與元始通吉祥成大功於是太玄道父威德自在天尊定一眞人蔚羅眞人飛仙玉女清和玉女水史眞妃芳華采玉女諸天仙衆異口同光並作一音太和自然説偈讃嘆云
