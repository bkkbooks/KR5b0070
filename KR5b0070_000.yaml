body:
  text: 太極紫微帝心呪十通吉样檀熾鈞臣等六根爲讃揚惟願慈悲作證度呪燭無窮照法界大光大明三景輪明過日月及天光照燭幽途普開朗呪音無窮通法界神雷天鼓玉音傳振輝法韻響靈音開悟衆生悉明慧呪香無窮徧法界不增不減太和風灑爲法雨出爲雲霑馥衆生溥清淨呪味無邊周法界太和太一萬善源外爲神水内華池潤益衆生悉長命呪相無窮大變化眞應法身如塵沙金肌玉骨萬道全堅固金剛形不壞呪心十通徧法界無高無下普開明龍光一㸃出中山照徹人天悉開悟呪威無量神通廣力過那耶殺古尊牧降六洞大魔軍斷絶鬼鋒正仙逍呪福無邊廣圓滿冨王貴王不能過有如天尊大意珠光照無窮福德藏呪德無量大慈悲從劫至劫運慈仁巍巍三氣道中尊周濟人天悉圓滿臣等六根讃嘆已至於身外植玄根玄根永茂徧人天同等一乗真妙行是時太玄道父威德自在天尊定一眞人蔚羅眞人諸天眞人神仙天帝神王仙官仙王飛仙玉女水史眞妃芳華来玉女等説偈讃嘆巳稽首天尊奉辤而退太上洞淵三昧帝心光明正印太極紫微伏魔制鬼拯救惡道集福吉祥神呪
